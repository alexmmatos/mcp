services:

  # ── Nginx reverse proxy (porta 80) ─────────────────────────────────────────
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
      - frontend
    restart: unless-stopped

  # ── NestJS backend ──────────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mcp-dashboard
    environment:
      - PORT=3000
      - NODE_ENV=production
      - MCP_API_KEY=${MCP_API_KEY:-super-secret-key}
      - EXTERNAL_API_BASE_URL=${EXTERNAL_API_BASE_URL:-https://jsonplaceholder.typicode.com}
      - MONGODB_URI=mongodb://${MONGO_USER:-mcp}:${MONGO_PASSWORD:-mcp_password}@mongo:27017/${MONGO_DB:-mcp_db}?authSource=admin
      - DASHBOARD_USER=${DASHBOARD_USER:-admin}
      - DASHBOARD_PASSWORD=${DASHBOARD_PASSWORD:-admin123}
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production-secret}
    depends_on:
      mongo:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ── React frontend (Vite dev server com HMR) ────────────────────────────────
  frontend:
    image: node:20-alpine
    container_name: mcp-frontend
    working_dir: /app/client
    volumes:
      - ./client:/app/client:delegated
      - /app/client/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
    command: sh -c "npm install && npm run dev -- --host"
    restart: unless-stopped

  # ── MongoDB ─────────────────────────────────────────────────────────────────
  mongo:
    image: mongo:7-jammy
    container_name: mcp-mongo
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_USER:-mcp}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_PASSWORD:-mcp_password}
      - MONGO_INITDB_DATABASE=${MONGO_DB:-mcp_db}
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  mongo_data:
